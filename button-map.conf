# CAD Mouse MK2 — button key mapping
#
# Format:
#   button <n>  <window-pattern>  [key [key ...]]
#
# window-pattern  Case-insensitive substring match against the active window
#                 title. Use * to match any window. First match wins.
# keys            xdotool key names, space-separated. Each key is sent in
#                 order with a short delay between them. Leave blank to do
#                 nothing for that app.
#
# Reload without restarting: kill -HUP $(cat /tmp/spacemouse-buttons.pid)

# ── Button 1 : Fit All / Zoom Extents ────────────────────────────────────────
button 1  FreeCAD      v f
button 1  SOLIDWORKS   f
button 1  Inventor     F6
button 1  Rhino        z
button 1  Fusion       Home
button 1  Blender      Home
button 1  *            f

# ── Button 2 : (add your own) ─────────────────────────────────────────────────
button 2  *
